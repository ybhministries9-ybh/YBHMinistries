name: Fuzz Regression

on:
  push:
    branches: [ main, securityfixes ]
  schedule:
    - cron: '0 2 * * 0' # weekly on Sundays

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Start server in background
        run: |
          nohup npm run start &
          sleep 5
      - name: Run fuzz tests
        env:
          TARGET_BASE: http://localhost:3000
        run: |
          npm run fuzz-app-router || true
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-results
          path: logs/
